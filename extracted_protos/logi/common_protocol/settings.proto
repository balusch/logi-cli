syntax = "proto3";

package logi.protocol.settings;

message KeyValue {
  string key = 1;
  string created_time = 2;
  string last_modified_time = 3;
  oneof value {
    bool bool_value = 4;
    double double_value = 5;
    int64 int_value = 6;
    string string_value = 7;
  }
}

message Event {
  enum Action {
    INVALID = 0;
    UPDATED = 1;
    ADDED = 2;
    DELETED = 3;
  }

  .logi.protocol.settings.Event.Action action = 1;
  .logi.protocol.settings.KeyValue old_setting = 2;
  .logi.protocol.settings.KeyValue new_setting = 3;
}

message Error {
  enum Code {
    UNKNOWN = 0;
    PERMISSIONS = 1;
    LOW_DISK_SPACE = 2;
  }

  .logi.protocol.settings.Error.Code code = 1;
}


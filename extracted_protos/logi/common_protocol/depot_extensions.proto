syntax = "proto3";

package logi.protocol.depot_extensions;

message DepotExecutable {
  string pipeline_uri = 1;
  repeated string arguments = 2;
}

message Extension {
  string name = 1;
  string version = 2;
  bool auto_install = 3;
  .logi.protocol.depot_extensions.DepotExecutable installer = 4;
  .logi.protocol.depot_extensions.DepotExecutable uninstaller = 5;
}

message ExtensionState {
  enum State {
    INVALID_EXTENSION_STATE = 0;
    EXTENSION_UNINSTALLING = 1;
    EXTENSION_UNINSTALLED = 2;
    EXTENSION_UNINSTALL_ERROR = 3;
    EXTENSION_INSTALLING = 4;
    EXTENSION_INSTALLED = 5;
    EXTENSION_INSTALL_ERROR = 6;
    EXTENSION_TO_REINSTALL = 7;
    NO_SUCH_EXTENSION = 8;
  }

  .logi.protocol.depot_extensions.ExtensionState.State state = 1;
  string error = 2;
}

message DepotExtension {
  string depot_name = 1;
  string extension_name = 2;
  .logi.protocol.depot_extensions.ExtensionState state = 3;
}

message ExtensionInstall {
  .logi.protocol.depot_extensions.Extension extension = 1;
  .logi.protocol.depot_extensions.ExtensionState state = 2;
}

message ExtensionInstalls {
  repeated .logi.protocol.depot_extensions.ExtensionInstall extensions = 1;
}


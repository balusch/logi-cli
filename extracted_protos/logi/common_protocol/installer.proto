syntax = "proto3";

package logi.protocol.installer;

import "logi/common_protocol/depot_extensions.proto";
import "logi/common_protocol/updates.proto";

message Product {
  string guid = 1;
  string name = 2;
  string publisher = 3;
  string icon = 4;
  string link_about = 5;
  string link_help = 6;
  string version = 7;
}

message Shortcut {
  string name = 1;
  string description = 2;
  string path = 3;
  bool on_start_menu = 4;
  bool on_desktop = 5;
}

message CommandLine {
  string executable = 1;
  repeated string arguments = 2;
  bool is_system = 3;
}

message CommandLineConditional {
  .logi.protocol.installer.CommandLine command = 1;
  bool run_during_the_upgrade = 2;
}

message DriverPackage {
  message Driver {
    enum Type {
      INVALID_TYPE = 0;
      INF = 1;
      KEXT = 2;
      PLUGIN = 3;
    }

    .logi.protocol.installer.DriverPackage.Driver.Type type = 1;
    string source = 2;
    string destination = 3;
    string version = 4;
    string hardware_id = 5;
    string recreate_device_nodes = 6;
    repeated string restart_services = 7;
  }

  string package_name = 1;
  repeated .logi.protocol.installer.DriverPackage.Driver drivers = 2;
  bool reboot_needed = 3;
}

message ProcessIdentifier {
  enum Type {
    INVALID_TYPE = 0;
    KILL_USING_LOGI_UTIL = 1;
    KILL_USING_PROCESS_NAME = 2;
    DONT_KILL = 3;
  }

  string process_name = 1;
  .logi.protocol.installer.ProcessIdentifier.Type type = 2;
}

message ProcessControlEx {
  repeated .logi.protocol.installer.ProcessIdentifier process_identifiers = 1;
  string lockdown_name = 2;
}

message ProcessControl {
  repeated string identifiers = 1;
  string lockdown_name = 2;
}

message ConnectionWaitCheck {
  string identifier = 1;
  int32 within_seconds = 2;
  optional string with_feature_flag = 3;
}

message Installer {
  message Launchable {
    enum LaunchableType {
      UNKNOWN = 0;
      PRECONDITION = 1;
      SYSTEM_SERVICE = 2;
      USER_SERVICE = 3;
      FRONTEND = 4;
      ON_DEMAND_FRONTEND = 5;
    }

    enum ConditionalMask {
      DO_NOT_LAUNCH = 0;
      UNCONDITIONAL = 2147483647;
      INSTALL_BIT = 1;
      UPDATE_BIT = 2;
      RESTART_BIT = 4;
      MANUAL_BIT = 16;
      AUTO_BIT = 32;
      ANY_INSTALL = 49;
      ANY_UPDATE = 50;
      ANY_RESTART = 52;
      ANY_INSTALL_UPDATE = 51;
      ANY_INSTALL_UPDATE_RESTART = 55;
      AUTO_UPDATE = 34;
      MANUAL_UPDATE = 18;
      MANUAL_INSTALL_UPDATE = 19;
      MANUAL_UPDATE_RESTART = 22;
      MANUAL_INSTALL_UPDATE_RESTART = 23;
    }

    .logi.protocol.installer.CommandLine command = 1;
    string service = 2;
    bool as_agent = 3;
    bool as_console_user = 4;
    bool as_kernel = 5;
    string display_name = 6;
    bool autostart = 7;
    string register_path = 8;
    bool deferred = 9;
    .logi.protocol.installer.Installer.Launchable.ConditionalMask conditional_mask = 10;
    .logi.protocol.installer.Installer.Launchable.LaunchableType type = 11;
    string alias = 12;
  }

  message RunLaunchanleByAliasRequest {
    string depot_name = 1;
    string launchable_alias = 2;
    bool wait_and_get_exit_code = 3;
  }

  message RunLaunchanleByAliasResponse {
    int32 exit_code = 1;
  }

  message File {
    string source = 1;
    string destination = 2;
    string sha256 = 3;
    string file_group = 4;
    bool disable_folder_tracking = 5;
    bool move = 6;
    string owner = 11;
    string group = 12;
    uint32 mode = 13;
    bool register_library = 21;
  }

  message RegionalFile {
    message Variant {
      string src = 1;
      .logi.protocol.updates.RegionCondition region = 2;
    }

    repeated .logi.protocol.installer.Installer.RegionalFile.Variant region_variants = 1;
    string src = 2;
  }

  message Detection {
    message WinRegistry {
      string registry_path = 1;
      string registry_key = 2;
      string executable = 3;
    }

    message OSXBundle {
      string bundle_id = 1;
      string bundle_path = 2;
    }

    message SteamGame {
      string app_id = 1;
    }

    string path_append = 6;
    repeated string landmark_files = 7;
    string tag = 8;
    oneof detectionType {
      string file_path = 1;
      string another_tag = 2;
      .logi.protocol.installer.Installer.Detection.WinRegistry registry = 3;
      .logi.protocol.installer.Installer.Detection.OSXBundle osx_bundle = 4;
      .logi.protocol.installer.Installer.Detection.SteamGame steam = 5;
    }
  }

  .logi.protocol.installer.Product product = 1;
  .logi.protocol.installer.CommandLine installer = 2;
  .logi.protocol.installer.CommandLine updater = 3;
  .logi.protocol.installer.CommandLine uninstaller = 4;
  .logi.protocol.installer.CommandLine user_uninstaller = 5;
  .logi.protocol.installer.CommandLine user_repair = 6;
  .logi.protocol.installer.ProcessControl process_control = 7;
  repeated .logi.protocol.installer.Installer.File files = 8;
  repeated .logi.protocol.installer.Installer.Launchable launchables = 9;
  repeated .logi.protocol.installer.DriverPackage driver_packages = 10;
  repeated .logi.protocol.installer.Shortcut shortcuts = 11;
  repeated .logi.protocol.installer.Installer.Detection detection = 12;
  repeated .logi.protocol.installer.CommandLineConditional uninstall_commands = 13;
  repeated .logi.protocol.installer.Installer.RegionalFile regional_files = 14;
  repeated .logi.protocol.depot_extensions.Extension extensions = 15;
  .logi.protocol.installer.ProcessControlEx process_control_ex = 16;
  .logi.protocol.installer.ConnectionWaitCheck will_connect_to_lus_ipc = 17;
}

message DriverStore {
  repeated .logi.protocol.installer.DriverPackage driver_packages = 1;
}

message Installation {
  message File {
    string path = 1;
    string sha256 = 2;
    bool register_library = 21;
  }

  message Files {
    repeated .logi.protocol.installer.Installation.File file = 1;
  }

  message Folder {
    string path = 1;
  }

  message Folders {
    repeated .logi.protocol.installer.Installation.Folder folder = 1;
  }

  message Service {
    string service = 1;
    bool as_console_user = 2;
    .logi.protocol.installer.CommandLine command = 3;
  }

  message Services {
    repeated .logi.protocol.installer.Installation.Service service = 1;
  }

  message Autostartable {
    string name = 1;
    .logi.protocol.installer.CommandLine command = 2;
  }

  message ExtensionsEntry {
    string key = 1;
    .logi.protocol.depot_extensions.ExtensionInstalls value = 2;
  }

  .logi.protocol.installer.Product product = 1;
  .logi.protocol.installer.CommandLine uninstaller = 2;
  .logi.protocol.installer.CommandLine user_uninstaller = 3;
  .logi.protocol.installer.CommandLine user_repair = 4;
  .logi.protocol.installer.ProcessControl process_control = 5;
  repeated .logi.protocol.installer.Installation.File files = 6;
  repeated .logi.protocol.installer.Installation.Folder folders = 7;
  repeated .logi.protocol.installer.Installation.Service services = 8;
  repeated .logi.protocol.installer.DriverPackage drivers = 9;
  repeated .logi.protocol.installer.Shortcut shortcuts = 10;
  repeated string renamed_items = 11;
  repeated .logi.protocol.installer.Installation.Autostartable autostartables = 12;
  repeated .logi.protocol.installer.CommandLineConditional uninstall_commands = 13;
  repeated .logi.protocol.installer.Installation.ExtensionsEntry extensions = 14;
  .logi.protocol.installer.ProcessControlEx process_control_ex = 15;
  .logi.protocol.installer.ConnectionWaitCheck will_connect_to_lus_ipc = 16;
}


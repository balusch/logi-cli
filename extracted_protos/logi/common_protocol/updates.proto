syntax = "proto3";

package logi.protocol.updates;

import "google/protobuf/any.proto";

message Status {
  message Progress {
    float percent = 1;
    float rate = 2;
    uint64 download_size = 3;
    uint64 expected_size = 4;
    .logi.protocol.updates.Status.ProgressType type = 5;
  }

  enum State {
    INVALID = 0;
    INITIALIZING = 1;
    NO_UPDATES = 2;
    CHECKING_FOR_UPDATES = 3;
    UPDATE_AVAILABLE = 4;
    FEATURE_KEYS_AVAILABLE = 5;
    UPDATE_DOWNLOADING = 6;
    UPDATE_UNPACKING = 7;
    UPDATE_READY = 8;
    UPDATE_INSTALLING = 9;
    RESTARTING = 10;
    DEPOTS_DOWNLOADING = 11;
    UPDATER_ERROR = 12;
    UNSUPPORTED_OS_ERROR = 13;
  }

  enum ProgressType {
    DOWNLOAD = 0;
    UNCOMPRESS = 1;
  }

  .logi.protocol.updates.Status.State state = 1;
  .logi.protocol.updates.Status.Progress progress = 2;
  int32 error_code = 3;
  string error_message = 4;
  uint32 retry_countdown = 5;
}

message Channel {
  string pipeline_host = 1;
  string name = 2;
  string password = 3;
  repeated string access_groups = 4;
}

message PeriodicCheck {
  bool check_periodically = 1;
  uint32 interval_in_seconds = 2;
  string next_check_due_date = 3;
  bool download_automatically = 4;
  string next_check_due_timestamp = 5;
}

message Signature {
  string signature = 1;
}

message SignaturesLegacy {
  uint32 version = 1;
  repeated string signatures = 2;
}

message Signatures {
  uint32 version = 1;
  repeated .logi.protocol.updates.Signature signatures = 2;
}

message Depot {
  message LegacyDepot {
    string name = 1;
    .logi.protocol.updates.Depot.State state = 2;
    string url = 3;
    string cipher_suite = 4;
    string iv = 5;
    string key = 6;
    string mac = 7;
    uint64 size = 8;
    string local_folder = 9;
    repeated string files = 10;
    repeated string depends_on = 11;
    bool required = 12;
    .logi.protocol.updates.SignaturesLegacy signatures = 13;
  }

  message DownloadContext {
    string build_id = 1;
    string depot_name = 2;
    string url = 3;
    string cipher_suite = 4;
    string iv = 5;
    string key = 6;
    string mac = 7;
    uint64 size = 8;
    string local_folder = 9;
    string downloaded_temp_file_path = 10;
    repeated string files = 11;
    .logi.protocol.updates.Depot.Usage usage = 12;
    .logi.protocol.updates.Signatures signatures = 13;
  }

  message Info {
    string name = 1;
    .logi.protocol.updates.Depot.State state = 2;
    string local_folder = 3;
    string build_id = 4;
    repeated string files = 5;
  }

  message Reinstall {
    message CustomTagsEntry {
      string key = 1;
      string value = 2;
    }

    string name = 1;
    string build_id = 2;
    repeated .logi.protocol.updates.Depot.Reinstall.CustomTagsEntry custom_tags = 3;
    repeated string file_groups = 4;
    bool skip_launchables = 5;
  }

  message InstallStatus {
    enum InstallState {
      INVALID = 0;
      INSTALLING = 1;
      COMPLETED = 2;
    }

    string depot_name = 1;
    .logi.protocol.updates.Depot.InstallStatus.InstallState state = 2;
  }

  enum State {
    INVALID = 0;
    LOCKED = 1;
    ABSENT = 2;
    REQUESTED = 3;
    DOWNLOADING_SIGNATURE = 9;
    SIGNATURE_PRESENT = 10;
    DOWNLOADING = 4;
    DOWNLOADED = 5;
    VERIFYING = 6;
    VERIFIED = 7;
    PRESENT = 8;
  }

  enum Usage {
    INVALID_USAGE = 0;
    CURRENT = 1;
    NEXT = 2;
  }

  string name = 1;
  .logi.protocol.updates.Depot.State state = 2;
  string url = 3;
  string cipher_suite = 4;
  string iv = 5;
  string key = 6;
  string mac = 7;
  uint64 size = 8;
  string local_folder = 9;
  repeated string files = 10;
  repeated string depends_on = 11;
  bool required = 12;
  .logi.protocol.updates.Signatures signatures = 13;
}

message DepositoryVersion {
  .logi.protocol.updates.Depot.Usage version = 1;
}

message ContentRequest {
  enum Type {
    FILE = 0;
    ROOT_JSON_FILE = 1;
  }

  .logi.protocol.updates.ContentRequest.Type type = 1;
  string pipeline_url = 2;
  string local_url = 3;
  bytes content = 4;
}

message MultipleContentRequest {
  repeated .logi.protocol.updates.ContentRequest content_items = 1;
}

message DepotList {
  repeated .logi.protocol.updates.Depot.Info depot = 1;
}

message LegacyDepository {
  string version = 1;
  string build_id = 2;
  string branch = 3;
  string access_group = 4;
  string region = 5;
  repeated .logi.protocol.updates.Depot.LegacyDepot depots = 6;
}

message Depository {
  string version = 1;
  string build_id = 2;
  string branch = 3;
  string access_group = 4;
  string region = 5;
  repeated .logi.protocol.updates.Depot depots = 6;
  string lockdown_name = 7;
  string app_id = 8;
}

message PackageNameList {
  repeated string names = 1;
}

message EnableUpdate {
  bool enabled = 1;
  bool reset_to_defaults = 2;
}

message InstallUpdate {
  bool is_automatic = 1;
}

message KeyStatus {
  enum Status {
    FAILED = 0;
    NO_NEW_KEYS = 1;
    FEATURE_KEYS_AVAILABLE = 2;
  }

  .logi.protocol.updates.KeyStatus.Status status = 1;
}

message DepositoryInfo {
  string version = 1;
  string build_id = 2;
  string branch = 3;
  string app_id = 4;
}

message Configuration {
  uint32 schema_version = 1;
  bool is_transferred = 2;
}

message Key {
  string name = 1;
  uint32 version = 2;
  uint64 last_modified = 3;
  string key = 4;
}

message AccessGroup {
  string access_group = 1;
  uint64 last_modified = 2;
  repeated .logi.protocol.updates.Key keys = 3;
}

message AccessTimestamp {
  uint64 last_modified = 1;
}

message RegionCondition {
  enum ConditionType {
    INVALID = 0;
    ALLOW = 1;
    RESTRICT = 2;
  }

  repeated string codes = 1;
  .logi.protocol.updates.RegionCondition.ConditionType type = 2;
}

message FeatureConditions {
  message ArchitectureFilter {
    enum ConditionType {
      INVALID = 0;
      ALLOW = 1;
      RESTRICT = 2;
    }

    enum Architecture {
      ANY = 0;
      X64 = 1;
      ARM64 = 2;
    }

    repeated .logi.protocol.updates.FeatureConditions.ArchitectureFilter.Architecture architectures = 1;
    .logi.protocol.updates.FeatureConditions.ArchitectureFilter.ConditionType type = 2;
  }

  message Flag {
    string flag = 1;
    bool default = 2;
  }

  enum Platform {
    any = 0;
    win = 1;
    osx = 2;
  }

  .logi.protocol.updates.RegionCondition region = 1;
  .logi.protocol.updates.FeatureConditions.Flag flag_must_be_enabled = 2;
  .logi.protocol.updates.FeatureConditions.Platform platform_only = 3;
  .logi.protocol.updates.FeatureConditions.ArchitectureFilter platform_arch = 4;
}

message FeatureConfig {
  message Actions {
    repeated string conditional_depots = 1;
    repeated string add_feature_flags = 2;
  }

  message Item {
    string name = 1;
    .logi.protocol.updates.FeatureConditions conditions = 2;
    .logi.protocol.updates.FeatureConfig.Actions actions = 3;
  }

  repeated .logi.protocol.updates.FeatureConfig.Item configurations = 1;
}

message FeaturesCache {
  string region = 1;
  repeated string feature_flags = 2;
}

message Settings {
  string settings_json = 1;
}

message UpdaterServiceInstall {
  enum InstallMode {
    NEVER = 0;
    MANUALLY = 1;
    ALWAYS = 2;
  }

  enum State {
    INVALID = 0;
    NOT_INSTALLED = 1;
    DOWNLOADING_DEPOT = 2;
    DOWNLOADED_DEPOT = 3;
    INSTALLING = 4;
    INSTALLED = 5;
  }

  .logi.protocol.updates.UpdaterServiceInstall.InstallMode install_mode = 1;
  bool is_managed = 2;
  .logi.protocol.updates.UpdaterServiceInstall.State installation_state = 3;
}


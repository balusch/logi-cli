syntax = "proto3";

package logi.protocol.event_tracing;

message Event {
  message AttributesEntry {
    string key = 1;
    string value = 2;
  }

  string name = 1;
  uint64 steady_time = 2;
  int32 type = 3;
  int32 trace_id = 4;
  repeated .logi.protocol.event_tracing.Event.AttributesEntry attributes = 5;
  optional string data = 6;
}

message Events {
  int64 steady_base = 1;
  int64 system_base = 2;
  repeated .logi.protocol.event_tracing.Event events = 3;
}

message TraceEntry {
  message AttributesEntry {
    string key = 1;
    string value = 2;
  }

  string name = 1;
  int32 trace_type = 2;
  double duration_ms = 3;
  repeated .logi.protocol.event_tracing.TraceEntry.AttributesEntry attributes = 4;
}

message TraceIds {
  repeated int32 trace_ids = 1;
}

message TraceSequenceRequest {
  message IdNamesEntry {
    int32 key = 1;
    string value = 2;
  }

  repeated .logi.protocol.event_tracing.TraceSequenceRequest.IdNamesEntry id_names = 1;
  repeated int32 trace_ids = 2;
}

message TraceSequence {
  int32 trace_id = 1;
  string trace_name = 2;
  double duration_ms = 3;
  double steady_time = 4;
  repeated .logi.protocol.event_tracing.TraceEntry trace_entries = 5;
}

message TraceSequences {
  repeated .logi.protocol.event_tracing.TraceSequence traces = 1;
  optional string data = 2;
}


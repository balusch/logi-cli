syntax = "proto3";

package logi.protocol.devices;

import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";
import "logi/protocol/audio.proto";
import "logi/protocol/firmware_lighting.proto";
import "logi/protocol/force_sensing.proto";
import "logi/protocol/haptics.proto";
import "logi/protocol/lighting_support.proto";
import "logi/protocol/microphone.proto";
import "logi/protocol/mouse.proto";
import "logi/protocol/keyboard.proto";
import "logi/protocol/util.proto";
import "logi/protocol/backlight.proto";
import "logi/protocol/disable_keys.proto";
import "logi/protocol/illumination_light.proto";
import "logi/protocol/touchpad.proto";
import "logi/protocol/dfu.proto";
import "logi/protocol/presenter.proto";
import "logi/protocol/presentation_timers.proto";
import "logi/protocol/crown.proto";
import "logi/protocol/unified_profiles.proto";

message Device {
  message Interface {
    message Status {
      bool has_features = 1;
      bool connected = 2;
      bool is_bootloader = 3;
      bool blocked = 4;
      bool ready = 5;
      bool active = 6;
      bool starting = 7;
      uint32 configuration_id = 8;
      uint32 active_configuration = 9;
      .logi.protocol.devices.Device.Disconnect disconnect_reason = 10;
    }

    message Data {
      .logi.protocol.devices.Device.Interface.Type type = 1;
      string id = 2;
      uint32 pid = 3;
      uint32 model_id = 4;
      uint32 extended_model = 5;
      string serial_number = 6;
      string path = 7;
      string container_id = 8;
      .logi.protocol.devices.Device.Type device_type = 9;
      string device_name = 10;
      .logi.protocol.devices.Keyboard.Layout keyboard_layout = 11;
      string firmware_version = 12;
      string firmware_revision = 13;
      .logi.protocol.devices.Device.Interface.Connection connection_type = 15;
      bool has_onboard_mode = 16;
      uint32 host_channel = 17;
      string hashed_serial_number = 18;
      string udid = 19;
      bool dfu_requires_user_action = 30;
      repeated uint32 dfu_control_action_data = 31;
    }

    message State {
      message List {
        .logi.protocol.devices.Device.Info.Basic basic_info = 1;
        repeated .logi.protocol.devices.Device.Interface.State interface_states = 2;
      }

      .logi.protocol.devices.Device.Interface.Status status = 1;
      .logi.protocol.devices.Device.Interface.Data data = 2;
    }

    enum Type {
      INVALID_TYPE = 0;
      DEVIO = 1;
      DRIVER = 2;
      APO = 3;
      HIDIO = 4;
      UVC = 5;
      HIDIO_FILTER = 6;
      AUDIO = 7;
      VIRTUAL_DEVICE = 8;
      DJ_RCVR_DFU = 9;
    }

    enum Connection {
      INVALID_CONNECTION = 0;
      VIRTUAL = 1;
      USB = 2;
      WIRELESS = 3;
      BLUETOOTH = 4;
      BLE = 5;
      BLE_PRO = 6;
    }

  }

  message Disconnect {
    enum Reason {
      LINK_LOSS = 0;
      DEVICE_NOT_RESPONDING = 1;
      NOT_PERMITTED = 2;
      SECURE_INPUT_ACTIVE = 3;
    }

    .logi.protocol.devices.Device.Disconnect.Reason reason = 1;
    string secure_input_application = 2;
    bool secure_input_is_always_enabled = 3;
  }

  message TestFailure {
    bool forced_inactive = 1;
    .logi.protocol.devices.Device.Disconnect disconnect_reason = 2;
  }

  message BatteryStatus {
    enum ChargingStatus {
      INVALID_CHARGING_STATUS = 0;
      DISCHARGING = 1;
      CHARGING = 2;
      CHARGING_SLOW_RATE = 3;
      CHARGE_COMPLETE = 4;
      CHARGE_ERROR = 5;
      WIRELESS_CHARGING = 6;
    }

    uint32 state_of_charge = 1;
    .logi.protocol.devices.Device.BatteryStatus.ChargingStatus charging_status = 2;
  }

  message Info {
    message Basic {
      string id = 1;
      .logi.protocol.devices.Device.Type device_type = 2;
      string device_model = 3;
      string slot_prefix = 4;
      uint32 pid = 5;
      uint32 unit_id = 6;
      uint32 extended_model_id = 7;
      .logi.protocol.devices.Device.Interface.Connection connection_type = 8;
      string path = 9;
      bool is_combo = 10;
      string depot = 11;
      string device_name = 12;
    }

    message FirmwareInfo {
      string version = 1;
      string build = 2;
      string prefix = 3;
      uint32 rdnf = 4;
      int32 type = 5;
      string pid1 = 6;
      string pid2 = 7;
      string pid3 = 8;
      uint32 transport = 9;
    }

    message Combo {
      string model_id = 1;
      string depot = 2;
      string display_name = 3;
      .logi.protocol.devices.Device.Type device_type = 4;
      string slot_prefix = 5;
      bool consider_for_onboarding = 6;
    }

    message ConfigurationsEntry {
      string key = 1;
      .logi.protocol.unified_profiles.Configuration.Header value = 2;
    }

    message List {
      repeated .logi.protocol.devices.Device.Info device_infos = 1;
    }

    string id = 1;
    uint32 pid = 2;
    .logi.protocol.devices.Device.State state = 3;
    bool onboard_mode = 4;
    bool resources_available = 5;
    .logi.protocol.devices.Device.Interface.Connection connection_type = 6;
    bool has_wireless_interface = 7;
    uint32 configuration_id = 8;
    .logi.protocol.devices.Device.Disconnect disconnect_reason = 9;
    string depot = 10;
    .logi.protocol.devices.Device.Type device_type = 20;
    string device_model = 21;
    string display_name = 22;
    string extended_display_name = 23;
    string slot_prefix = 24;
    string thumbnail = 25;
    string hotspot_color = 26;
    string string_package = 29;
    bool hide_easy_switch_connection_type = 27;
    .logi.protocol.devices.Capabilities capabilities = 30;
    repeated .logi.protocol.devices.Device.Interface.Data active_interfaces = 40;
    string receiver_id = 50;
    .logi.protocol.devices.Receiver.PairingMethod pairing_method = 51;
    uint32 bus_port = 52;
    uint32 unit_id = 53;
    uint32 battery_discharge_level = 54;
    uint32 extended_model_id = 55;
    .logi.protocol.devices.Receiver.BleProPairingInfo ble_pro_pairing_info = 56;
    .logi.protocol.devices.Device.BatteryStatus battery_status = 57;
    string friendly_name = 58;
    string path = 59;
    uint32 max_pairable_device_count = 60;
    bool supported = 61;
    bool options_device = 62;
    bool fetch_resource = 63;
    string hashed_serial_number = 64;
    .logi.protocol.dfu.Info fw_update = 65;
    string device_serial_number = 66;
    string firmware_version = 67;
    string udid = 68;
    bool business = 69;
    string model_id = 70;
    repeated .logi.protocol.devices.Device.Info.Combo combo_devices = 71;
    bool disable_fw_update = 72;
    string firmware_revision = 73;
    bool dfu_requires_user_action = 74;
    repeated string receiver_ids = 75;
    bool connected = 76;
    .logi.protocol.devices.Device.Info.FirmwareInfo firmware_info = 77;
    .logi.protocol.devices.Receiver.BleConnectorType ble_connector_type = 78;
    repeated uint32 dfu_control_action_data = 79;
    string supported_dfu_feature = 80;
    bool guru_device = 81;
    string hashed_device_serial_number = 82;
    bool is_owned = 83;
    repeated .logi.protocol.devices.Device.Info.ConfigurationsEntry configurations = 84;
    uint64 first_connected_timestamp = 85;
  }

  enum Type {
    INVALID_TYPE = 0;
    KEYBOARD = 1;
    MOUSE = 2;
    HEADSET = 3;
    STEERING_WHEEL = 4;
    HID_DEVICE = 5;
    CHARGE_PAD = 6;
    SPEAKER = 7;
    CAMERA = 8;
    MICROPHONE = 9;
    RECEIVER = 10;
    NUMPAD = 11;
    REMOTE = 12;
    TOUCHPAD = 13;
    TRACKBALL = 14;
    ILLUMINATION_LIGHT = 15;
    VIRTUAL_DEVICE = 16;
    CONTEXTUAL_KEYS = 17;
    DIAL = 18;
    PRESENTER = 19;
  }

  enum State {
    INVALID_STATE = 0;
    ABSENT = 1;
    PRESENT = 2;
    NOT_CONNECTED = 3;
    PENDING = 4;
    LOADING_RESOURCES = 5;
    BLOCKED = 6;
    INACTIVE = 7;
    REQUIRES_UPDATE = 8;
    READY = 9;
    INITIALIZING = 10;
    ACTIVE = 11;
  }

}

message Receiver {
  message Advertise {
    string name = 1;
    string device_address = 2;
    uint32 pid = 3;
    uint32 psd = 4;
    .logi.protocol.devices.Receiver.Pairing.AuthenticationMethod authentication_method = 5;
    string receiver_id = 6;
    .logi.protocol.devices.Device.Type device_type = 7;
    string thumbnail = 8;
    bool left_handed = 9;
    bool vertical = 10;
    bool requires_receiver_update = 11;
  }

  message Recovery {
    string name = 1;
    string device_address = 2;
    uint32 pid = 3;
    uint32 unit_id = 4;
    string receiver_id = 6;
    string thumbnail = 7;
    bool left_handed = 8;
    bool vertical = 9;
  }

  message Discovery {
    enum Error {
      UNKNOWN_DISCOVERY_ERROR = 0;
      NO_DISCOVERY_ERROR = 1;
      TIMEOUT = 2;
      FAILED = 3;
    }

    enum State {
      UNKNOWN_STATE = 0;
      START = 1;
      CANCEL = 2;
      STOP = 3;
    }

    enum Status {
      UNKNOWN_STATUS = 0;
      NONE = 1;
      DISCOVER_HID_DEVICES = 2;
      CANCEL_DISCOVERY = 3;
    }

    .logi.protocol.devices.Receiver.Discovery.Error error = 1;
    .logi.protocol.devices.Receiver.Discovery.State state = 2;
    .logi.protocol.devices.Receiver.Discovery.Status status = 3;
    string receiver_id = 4;
    int32 timeout_seconds = 5;
  }

  message PairingState {
    enum Error {
      UNKNOWN_PAIRING_ERROR = 0;
      NO_PAIRING_ERROR = 1;
      TIMEOUT = 2;
      FAILED = 3;
      DISCONNECTED = 4;
    }

    enum State {
      UNKNOWN_PAIRING_STATE = 0;
      START = 1;
      CANCEL = 2;
      STOP = 3;
    }

    .logi.protocol.devices.Receiver.PairingState.Error error = 1;
    .logi.protocol.devices.Receiver.PairingState.State state = 2;
    string device_address = 3;
    uint32 pairing_slot = 4;
    string receiver_id = 5;
    .logi.protocol.devices.Device.Info.Basic paired_device = 6;
  }

  message PassKeyDisplay {
    string device_address = 1;
    string receiver_id = 2;
    string passkey = 3;
  }

  message PassKeyEntry {
    enum PassKeyCode {
      UNKNOWN_PASSKEY_CODE = 0;
      START = 1;
      DIGIT_IN = 2;
      DIGIT_OUT = 3;
      CLEAR = 4;
      END = 5;
    }

    enum TwoButtonAuthNextClick {
      NONE = 0;
      LEFT = 1;
      RIGHT = 2;
      BOTH = 3;
      UP = 4;
      DOWN = 5;
      ONE_FINGER_TAP_OR_CLICK = 6;
      TWO_FINGER_TAP_OR_CLICK = 7;
      THREE_FINGER_TAP = 8;
    }

    .logi.protocol.devices.Receiver.PassKeyEntry.PassKeyCode code = 1;
    string device_address = 2;
    string receiver_id = 3;
    .logi.protocol.devices.Receiver.PassKeyEntry.TwoButtonAuthNextClick next_click = 4;
  }

  message Pairing {
    enum AuthenticationMethod {
      UNKNOWN = 0;
      PASSKEY = 1;
      TWO_BUTTONS = 2;
      PREPARING = 3;
    }

    enum Error {
      NO_PAIRING_ERROR = 0;
      FAILED = 1;
    }

    .logi.protocol.devices.Receiver.Pairing.AuthenticationMethod authentication_method = 1;
    .logi.protocol.devices.Receiver.Pairing.Error error = 2;
    string device_address = 3;
    string device_id = 4;
    string receiver_id = 5;
  }

  message BleProPairingInfo {
    .logi.protocol.devices.Receiver.Pairing.AuthenticationMethod authentication_method = 1;
    uint32 entropy_length = 2;
    bool in_recovery_state = 3;
  }

  message Enumerate {
    repeated .logi.protocol.devices.Receiver.PairingMethod pairing_method = 1;
  }

  message Locking {
    enum Error {
      UNKNOWN_LOCKING_ERROR = 0;
      NO_LOCKING_ERROR = 1;
      TIMEOUT = 2;
      UNSUPPORTED_DEVICE = 3;
      TOO_MANY_DEVICES = 4;
      RCV_OUT_OF_OTP_MEMORY = 5;
      DVC_OUT_OF_OTP_MEMORY = 6;
      CONN_SEQUENCE_TIMEOUT = 7;
    }

    enum State {
      UNKNOWN_STATE = 0;
      OPENED = 1;
      CLOSED = 2;
    }

    enum Status {
      UNKNOWN_STATUS = 0;
      NONE = 1;
      OPEN_LOCK = 2;
      CLOSE_LOCK = 3;
    }

    .logi.protocol.devices.Receiver.Locking.Error error = 1;
    .logi.protocol.devices.Receiver.Locking.State state = 2;
    .logi.protocol.devices.Receiver.Locking.Status status = 3;
    string receiver_id = 4;
  }

  enum PairingMethod {
    UNKNOWN_PAIRING_METHOD = 0;
    UNIFYING = 1;
    UNIFYING_READY = 2;
    BLE_PRO = 3;
  }

  enum BleConnectorType {
    UNKNOWN = 0;
    MEZZI = 1;
    ZITI = 2;
    MALACCA = 3;
  }

}

message Blockers {
  message Blocker {
    enum Type {
      BLOCKER_NONE = 0;
      REQUIRES_REBOOT = 1;
      STUCK_IN_BOOTLOADER = 2;
      MISSING_DRIVER = 3;
      UNSUPPORTED = 4;
      MISSING_APO = 5;
      DISABLED_APO = 6;
      DEVICE_DISABLED = 7;
      DEVICE_QUARANTINED = 8;
      UNDETERMINED = -1;
    }

    .logi.protocol.devices.Blockers.Blocker.Type type = 1;
    bool recoverable = 2;
  }

  message DeviceBlocker {
    string id = 1;
    .logi.protocol.devices.Blockers.Blocker blocker = 2;
  }

  repeated .logi.protocol.devices.Blockers.DeviceBlocker device_blockers = 1;
}

message Driver {
  message Info {
    string id = 1;
    .logi.protocol.devices.Driver driver = 2;
  }

  enum Status {
    INVALID = 0;
    LOADED = 1;
    APPROVED = 2;
    BLOCKED = 3;
    REBOOT_NEEDED = 4;
    CONSENT_UNKNOWN = 5;
  }

  repeated string windows_ids = 1;
  repeated string osx_ids = 2;
  .logi.protocol.devices.Driver.Status status = 3;
}

message DextDriver {
  int32 status = 1;
}


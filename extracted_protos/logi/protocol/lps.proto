message PluginInfo {
  message LicenseInfo {
    bool is_license_required = 1;
    bool is_license_available = 2;
    bool is_trial_license = 3;
    string license_last_day = 4;
  }

  message Mode {
    string plugin_name = 1;
    string name = 2;
    string display_name = 3;
    string description = 4;
    string parent_name = 5;
    bool is_customizable = 6;
    bool has_sub_modes = 7;
  }

  string name = 1;
  string display_name = 2;
  string description = 3;
  string author = 4;
  string copyright = 5;
  string version = 6;
  string homepage = 7;
  string icon16x16 = 8;
  string icon32x32 = 9;
  string icon48x48 = 10;
  string icon256x256 = 11;
  repeated .logi.protocol.lps.PluginPreference plugin_preferences = 12;
  repeated .logi.protocol.lps.PluginInfo.Mode modes = 13;
  optional .logi.protocol.lps.PluginStatus plugin_status = 14;
  optional bool requires_admin_install = 15;
  optional bool requires_admin_uninstall = 16;
  optional bool will_be_enabled_at_next_startup = 17;
  optional bool require_application_close_on_install = 18;
  optional bool is_application_plugin = 19;
  optional bool is_additional_plugin = 20;
  optional string supported_devices = 21;
  optional bool can_be_uninstalled = 22;
  optional bool is_available_in_marketplace = 23;

syntax = "proto3";

package logi.protocol.lps;

import "google/protobuf/struct.proto";
import "google/protobuf/wrappers.proto";

message Endpoint {
  message Information {
    .logi.protocol.lps.Endpoint.State state = 1;
  }

  message Control {
    enum Type {
      INVALID_TYPE = 0;
      START = 1;
      STOP = 2;
    }

    .logi.protocol.lps.Endpoint.Control.Type type = 1;
    uint32 delay = 2;
    bool force = 3;
  }

  enum State {
    INVALID_STATE = 0;
    CREATED = 1;
    SHUTTING_DOWN = 2;
    LOADING_DEPOT = 3;
    LOADING_RESOURCES = 4;
    LOADED = 5;
    INSTALLATION_RUNNING = 6;
    INSTALLATION_INVALID = 7;
    INSTALLED = 8;
    DISCONNECTED = 9;
    WAITING_LPS_PROCESS = 10;
    CONNECTING = 11;
    CONNECTED = 12;
    PENDING_HANDSHAKE = 13;
    ACTIVE = 14;
  }

}

message Watchdog {
  message Condition {
    enum Type {
      INVALID_TYPE = 0;
      PROCESS = 1;
      APPLICATION_ID = 2;
      MUTEX = 3;
    }

    enum State {
      INVALID_STATE = 0;
      PRESENT = 1;
      NOT_PRESENT = 2;
    }

    .logi.protocol.lps.Watchdog.Condition.Type type = 1;
    .logi.protocol.lps.Watchdog.Condition.State state = 2;
    string name = 3;
  }

  message CommandLine {
    string executable = 1;
    repeated string arguments = 2;
    bool is_system = 3;
    string new_working_dir = 4;
  }

  message WatchSettings {
    enum ModificatorType {
      INVALID_TYPE = 0;
      ADDITION = 1;
      MULTIPLICATION = 2;
    }

    uint32 base_timeout = 1;
    uint32 timeout_modificator = 2;
    uint32 timeout_max = 3;
    uint32 retries_max = 4;
    .logi.protocol.lps.Watchdog.WatchSettings.ModificatorType modificator_type = 5;
  }

  message ShutdownPolicy {
    enum Type {
      INVALID_TYPE = 0;
      PROCESS = 1;
      BUNDLE_ID = 2;
    }

    .logi.protocol.lps.Watchdog.ShutdownPolicy.Type type = 1;
    string name = 2;
  }

  .logi.protocol.lps.Watchdog.Condition active_condition = 1;
  repeated .logi.protocol.lps.Watchdog.Condition start_conditions = 2;
  .logi.protocol.lps.Watchdog.CommandLine start_command = 3;
  .logi.protocol.lps.Watchdog.CommandLine stop_command = 4;
  .logi.protocol.lps.Watchdog.ShutdownPolicy shutdown_policy = 5;
  .logi.protocol.lps.Watchdog.WatchSettings watch_settings = 6;
  bool keepalive = 7;
}

message Configuration {
  string platform = 1;
  repeated string activation_devices = 2;
  .logi.protocol.lps.Watchdog watchdog = 3;
}

message Configurations {
  repeated .logi.protocol.lps.Configuration configurations = 1;
}

message GenericMessage {
  int32 id = 1;
  string name = 2;
  string channel = 3;
  .logi.protocol.lps.MessageType message_type = 4;
  .google.protobuf.Value data = 5;
  .google.protobuf.Value parameters = 6;
  string error_message = 7;
  .logi.protocol.lps.ErrorCode error_code = 8;
}

message HandshakeRequest {
  int32 minimum_protocol_version = 1;
  int32 maximum_protocol_version = 2;
}

message HandshakeResponse {
  int32 negotiated_protocol_version = 1;
}

message ServiceStatus {
  int32 status = 1;
  int32 uptime = 2;
  string version = 3;
}

message LoggingStartup {
  bool enabled = 1;
}

message LoggingStatus {
  bool enabled = 1;
  string log_directory = 2;
}

message LoginInfo {
  bool logged_in = 1;
  string user_id = 2;

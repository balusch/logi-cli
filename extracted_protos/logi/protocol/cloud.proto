syntax = "proto3";

package logi.protocol.cloud;

message Server {
  message Blob {
    string id = 1;
    string key = 2;
    string uploaded_by = 3;
    string url = 4;
    uint64 filesize = 5;
    string created_at = 6;
    string updated_at = 7;
  }

  message LipIdentity {
    string sub = 1;
    string email = 2;
    string given_name = 3;
    string family_name = 4;
    string picture = 5;
    string phone_number = 6;
  }

  message LipToken {
    string id_token = 1;
    string access_token = 2;
    string refresh_token = 3;
    int32 expires_in = 4;
    int64 refresh_token_expires_in = 5;
  }

  message Response {
    int32 status_code = 1;
    string text = 2;
    oneof parsed {
      .logi.protocol.cloud.Server.LipToken lip_token = 10;
      .logi.protocol.cloud.Server.LipIdentity lip_identity = 11;
    }
  }

}


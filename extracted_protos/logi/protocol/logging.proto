syntax = "proto3";

package logi.protocol.logging;

message Status {
  bool enabled_by_user = 1;
  bool enabled_by_cfg = 2;
}

message Paths {
  repeated string user_logs_paths = 1;
}

message Trigger {
  enum Action {
    INVALID = 0;
    ENABLE = 1;
    DISABLE = 2;
    SAVE = 3;
  }

  .logi.protocol.logging.Trigger.Action action = 1;
  string user_logs_archive_path = 2;
  repeated string user_logs_paths = 3;
}


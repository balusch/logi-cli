message Profile {
  message Slots {
    message Cards {
      message SlotCardsEntry {
        string key = 1;
        .logi.protocol.profiles_v2.Card value = 2;
      }

      string profile_id = 1;
      repeated .logi.protocol.profiles_v2.Profile.Slots.Cards.SlotCardsEntry slot_cards = 2;
    }

    string profile_id = 1;
    repeated string slots = 2;
  }

  string id = 1;
  string name = 2;
  string application_id = 3;
  bool active_for_application = 4;
  repeated .logi.protocol.profiles_v2.Assignment assignments = 5;
  string base_profile_id = 9;
}

message Profiles {
  repeated .logi.protocol.profiles_v2.Profile profiles = 1;
}

message GestureInfo {
  message Threshold {
    uint32 minimum_sensitivity_threshold = 1;
    uint32 maximum_sensitivity_threshold = 2;
    .logi.protocol.profiles_v2.GestureInfo.Units units = 3;
  }

  message ActionDurationMs {
    uint32 minimum_sensitivity_action_duration_ms = 1;
    uint32 maximum_sensitivity_action_duration_ms = 2;
  }

  message AxisInfo {
    message Bounds {
      double min = 1;
      double max = 2;
      double step = 3;
    }

    bool invertable = 1;
    bool speed_control = 2;
    bool auto_repeat = 3;
    uint32 pause_between_actions_ms = 4;
    uint32 action_duration_ms = 5;
    double speed_factor = 6;
    .logi.protocol.profiles_v2.GestureInfo.Threshold start_threshold = 7;
    .logi.protocol.profiles_v2.GestureInfo.Threshold action_threshold = 8;
    .logi.protocol.profiles_v2.GestureInfo.ActionDurationMs action_duration = 9;
    bool step_based = 10;
    .logi.protocol.profiles_v2.GestureInfo.AxisInfo.Bounds bounds = 11;
  }

  message Direction {
    .logi.protocol.touchpad.GestureDirection direction = 1;
    bool enabled = 2;
  }

  message ParametersEntry {
    string key = 1;
    string value = 2;
  }

  enum GestureImplementation {
    GENERIC = 0;
    CUSTOM_APPLICATION_NAVIGATION = 1;
    CUSTOM_ZOOM_ROTATE = 2;
    CUSTOM_PAN = 3;
    CUSTOM_SWITCH_DESKTOPS = 4;
    CUSTOM_HORIZONTAL_SCROLL = 5;
    CUSTOM_VOLUME_CONTROL = 6;
    CUSTOM_ZOOM_IN_OUT = 7;
    CUSTOM_DO_NOTHING = 8;
    CUSTOM_SWIPE_PAGES = 9;
    CUSTOM_INTEGRATION_THUMBWHEEL = 10;
    CUSTOM_PHOTOSHOP_ZOOM_AT_CURSOR = 11;
    CUSTOM_INTEGRATION_PHOTOSHOP_SLOWER_THUMBWHEEL = 12;
    CUSTOM_PAN_EXCEL = 13;
    CUSTOM_PAN_WORD = 14;
    CUSTOM_PAN_POWERPOINT = 15;
    CUSTOM_PAN_PREMIERE_PRO = 16;
    CUSTOM_INTEGRATION_PREMIERE_PRO_FASTER_THUMBWHEEL = 17;
    CUSTOM_PAN_FINAL_CUT_PRO = 18;
    CUSTOM_APP_EXPOSE_MISSION_CONTROL = 19;
    CUSTOM_NOTIFICATION_CENTER = 20;
    CUSTOM_SHOW_DESKTOP_LAUCHPAD = 21;
    CUSTOM_ROTATE = 22;
    CUSTOM_ZOOM_IN_OUT_TOUCHPAD = 23;
    CUSTOM_SCROLL_TOUCHPAD = 24;
    CUSTOM_SWIPE_PAGES_TOUCHPAD = 25;
    CUSTOM_SMART_ZOOM_TOUCHPAD = 26;
    CUSTOM_LOOK_UP_TOUCHPAD = 27;
    CUSTOM_STOP_TAP_TOUCHPAD = 28;
    CUSTOM_PRESENTER_VOLUME_CONTROL = 29;
    CUSTOM_PRESENTER_SCROLL = 30;
    CUSTOM_HIGHLIGHTS = 31;
    CUSTOM_INTEGRATION_CROWN = 32;
  }

  enum Units {
    DEVICE = 0;
    DEGREES = 1;
  }

  .logi.protocol.profiles_v2.GestureInfo.AxisInfo x = 1;
  .logi.protocol.profiles_v2.GestureInfo.AxisInfo y = 2;
  bool direction_locked = 3;
  .logi.protocol.profiles_v2.GestureInfo.GestureImplementation implementation = 4;
  bool prevent_delayed_termination = 5;
  uint32 custom_gesture_action_duration = 6;
  string integration_id = 7;
  string action_id = 8;
  repeated .logi.protocol.profiles_v2.GestureInfo.ParametersEntry parameters = 9;
  repeated .logi.protocol.profiles_v2.GestureInfo.Direction directions = 10;
}

message TouchpadGestureInfo {
  string slot_id = 1;
  .logi.protocol.profiles_v2.GestureInfo gesture_info = 2;
}


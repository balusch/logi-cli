    FN_INVERSION_SETTINGS = 23;
    ONE_OF = 24;
    MACRO_REF = 25;
    ADAPTER_CROWN = 26;
    VIRTUAL_PRECISION_MODE = 27;
    DISABLE_KEYS_SETTINGS = 28;
    DISABLE_KEYS_CAPABILITIES = 29;
    ILLUMINATION_LIGHT_SETTINGS = 30;
    CAMERA_PREVIEW_SETTINGS = 31;
    TOUCHPAD_SETTINGS = 32;
    TOUCHPAD_ACTION_GESTURE_MAP = 33;
    FOLDER = 34;
    BRIGHTNESS_SETTINGS = 35;
    WEBCAM_CAMERA_SETTINGS = 36;
    WEBCAM_VIDEO_SETTINGS = 37;
    WEBCAM_GLOBAL_SETTINGS = 38;
    CONTEXTUAL_ACTION = 39;
    START_PRESENTATION = 40;
    FOCUS_SCREEN = 41;
    PRESENTER_SETTINGS = 42;
    WEBCAM_CROP_SETTINGS = 43;
    WEBCAM_FOCUS_SETTINGS = 44;
    SOFTWARE_EVENT_SHORTCUT = 45;
    CHANGE_HIGHLIGHT = 46;
    PRESENTATION_TIMER_SETTINGS = 47;
    SOFTWARE_EVENT_TRY_MACRO = 48;
    SOFTWARE_EVENT_LPS = 49;
    SOFTWARE_EVENT_APPLICATION = 50;
    WHEEL_MODE_SHIFT = 51;
    WEBCAM_MICROPHONE_SETTINGS = 52;
    HAPTIC_SETTINGS = 53;
    FORCE_SENSING_SETTINGS = 54;
    CROWN_MODE_SETTINGS = 55;
    ADAPTER_CROWN_TURN = 56;
    ADAPTER_CROWN_PRESS_TURN = 57;
    ADAPTER_CROWN_PRESS = 58;
    TRIGGER_WAVEFORM = 59;
    HAPTIC_PROPERTIES = 60;
    SPECIAL_KEYS_DIVERT_STATE = 61;
    PLAY_BREATHING_EXERCISE = 62;
  }

  enum State {
    READY = 0;
    APPLICATION_PATH_REQUIRED = 1;
    PLUGIN_INSTALLATION_REQUIRED = 2;
    AI_PROMPT_BUILDER_ENABLING_REQUIRED = 3;
    DEVICE_NOT_CONNECTED = 4;
    HAPTIC_ENABLING_REQUIRED = 5;
  }

  string id = 1;
  string name = 2;
  .logi.protocol.profiles_v2.Card.Attribute attribute = 3;
  bool read_only = 6;
  bool execute_on_profile_change = 7;
  .logi.protocol.macros.Macro macro = 8;
  .logi.protocol.mouse.Settings mouse_settings = 11;
  string selected_nested_card = 12;
  repeated .logi.protocol.profiles_v2.Card.NestedCardsEntry nested_cards = 13;
  repeated string nested_cards_order = 14;
  .logi.protocol.mouse.ThumbWheelSettings mouse_thumb_wheel_settings = 25;
  .logi.protocol.mouse.ScrollWheelSettings mouse_scroll_wheel_settings = 26;
  .logi.protocol.keyboard.KeyboardSettings keyboard_settings = 30;
  .logi.protocol.backlight.Settings backlighting_settings = 34;
  .logi.protocol.devices.FnInversionSettings fn_inversion_settings = 35;
  .logi.protocol.profiles_v2.Card.ChangePointerSpeed change_pointer_speed = 36;
  .logi.protocol.mouse.PrecisionMode precision_mode = 37;
  .logi.protocol.disable_keys.DisableKeysSettings disable_keys_settings = 38;

  .logi.protocol.illumination_light.LightSettings illumination_light_settings = 40;
  .logi.protocol.illumination_light.CameraPreview camera_preview_settings = 41;
  .logi.protocol.profiles_v2.Card.State state = 42;
  .logi.protocol.touchpad.Settings touchpad_settings = 43;
  .logi.protocol.touchpad.ActionGestureMapping touchpad_action_gesture_map = 44;
  .logi.protocol.devices.DeviceBrightness brightness_settings = 45;
  .logi.protocol.profiles_v2.Card.Icons icons = 46;
  .logi.protocol.profiles_v2.Card.UserIntefaceSettings ui_settings = 47;
  bool require_focus = 48;
  .logi.protocol.devices.Webcam.CameraSettingsGroup camera_settings_group = 49;
  .logi.protocol.devices.Webcam.VideoSettingsGroup video_settings_group = 50;
  .logi.protocol.devices.Webcam.GlobalSettings webcam_global_settings = 51;
  .logi.protocol.presentation.Presentation presentation = 52;
  .logi.protocol.presenter.Settings presenter_settings = 53;
  .logi.protocol.devices.Webcam.CropSettingsGroup crop_settings_group = 54;
  .logi.protocol.devices.Webcam.FocusSettingsGroup focus_settings_group = 55;
  .logi.protocol.highlights.FocusScreen focus_screen = 56;
  .logi.protocol.highlights.ChangeHighlight change_highlight = 57;
  .logi.protocol.highlights.HighlightsSettings highlights_settings = 58;
  .logi.protocol.presentation_timers.TimerSettings timer_settings = 59;
  .logi.protocol.devices.Webcam.MicrophoneSettingsGroup microphone_settings_group = 60;
  .logi.protocol.haptics.HapticSettings haptic_settings = 61;
  .logi.protocol.force_sensing.ForceSensingSettings force_sensing_settings = 62;
  .logi.protocol.crown.Settings crown_mode_settings = 63;
  .logi.protocol.haptics.TriggerWaveformExecute waveform_info = 64;
  .logi.protocol.haptics.Haptics.HapticProperties haptic_properties = 65;
  .logi.protocol.devices.SpecialKeysDivertState special_keys_divert_state = 66;
  repeated string tags = 27;
  uint32 task_id = 28;
  string application_id = 29;
  .logi.protocol.macros.Gesture gesture = 31;
  .logi.protocol.profiles_v2.GestureInfo gesture_info = 32;
  bool continuous = 33;
  string category = 67;

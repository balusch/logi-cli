syntax = "proto3";

package logi.protocol.integrations;

import "logi/protocol/applications.proto";
import "logi/protocol/util.proto";

message IntegrationKey {
  enum Type {
    INVALID_TYPE = 0;
    REGISTRY = 1;
    FILE = 2;
  }

  string path = 1;
  string name = 2;
  string expected_value = 3;
  .logi.protocol.integrations.IntegrationKey.Type type = 4;
}

message IntegrationEntrySettings {
  .logi.protocol.integrations.IntegrationKey validation_key = 1;
  bool installed = 2;
}

message IntegrationManagerSettings {
  message InstalledPluginsEntry {
    string key = 1;
    bool value = 2;
  }

  message InstalledPluginsExEntry {
    string key = 1;
    .logi.protocol.integrations.IntegrationEntrySettings value = 2;
  }

  bool allow_led_sdk = 1;
  repeated .logi.protocol.integrations.IntegrationManagerSettings.InstalledPluginsEntry installed_plugins = 2;
  repeated .logi.protocol.integrations.IntegrationManagerSettings.InstalledPluginsExEntry installed_plugins_ex = 3;
}

message IntegrationGuids {
  repeated string guids = 1;
}

message LaunchCommand {
  message Conditional {
    enum InstallType {
      INVALID_TYPE = 0;
      IGNORE = 1;
      UPDATE = 2;
      FORCE = 3;
    }

    .logi.protocol.integrations.IntegrationKey validation_key = 1;
    uint32 major_version = 2;
    uint32 minor_version = 3;
    uint32 build_number = 4;
    .logi.protocol.integrations.LaunchCommand.Conditional.InstallType install_type = 5;
  }

  enum Platform {
    INVALID = 0;
    win = 1;
    osx = 2;
  }

  .logi.protocol.integrations.IntegrationGuids guids = 1;
  int32 magic = 2;
  string executable = 3;
  repeated string parameters = 4;
  bool silent = 5;
  bool run_as_admin = 6;
  .logi.protocol.integrations.LaunchCommand.Platform platform = 7;
  repeated .logi.protocol.integrations.LaunchCommand.Conditional conditionals = 8;
  .logi.protocol.integrations.Install depot_commands = 9;
}

message LaunchResult {
  enum ProgressType {
    INVALID_TYPE = 0;
    START = 1;
    EXECUTION = 2;
  }

  .logi.protocol.integrations.IntegrationGuids guids = 1;
  int32 magic = 2;
  .logi.protocol.integrations.LaunchResult.ProgressType type = 3;
  int32 return_code = 4;
}

message Integration {
  message ApplicationPreferences {
    bool enabled = 1;
  }

  message ConfigOption {
    message GroupValue {
      bool is_collapsed = 1;
      repeated .logi.protocol.integrations.Integration.ConfigOption sub_values = 2;
    }

    message BoolValue {
      bool default_value = 1;
      bool value = 2;
    }

    message IntValue {
      int32 default_value = 1;
      int32 value = 2;
      bool use_min_value = 3;
      int32 min_value = 4;
      bool use_max_value = 5;
      int32 max_value = 6;
    }

    message FloatValue {
      float default_value = 1;
      float value = 2;
      bool use_min_value = 3;
      float min_value = 4;
      bool use_max_value = 5;
      float max_value = 6;
    }

    message StringValue {
      string default_value = 1;
      string value = 2;
    }

    message ColorValue {
      .logi.protocol.util.Color default_value = 1;
      .logi.protocol.util.Color value = 2;
    }

    message KeyInputValue {
      string default_value = 1;
      string value = 2;
    }

    string label = 1;
    string key = 2;
    string full_key = 3;
    uint32 display_order = 4;
    oneof value_types {
      .logi.protocol.integrations.Integration.ConfigOption.GroupValue group_val = 5;
      .logi.protocol.integrations.Integration.ConfigOption.BoolValue bool_val = 6;
      .logi.protocol.integrations.Integration.ConfigOption.IntValue int_val = 7;
      .logi.protocol.integrations.Integration.ConfigOption.FloatValue float_val = 8;
      .logi.protocol.integrations.Integration.ConfigOption.StringValue string_val = 9;
      .logi.protocol.integrations.Integration.ConfigOption.ColorValue color_val = 10;
      .logi.protocol.integrations.Integration.ConfigOption.KeyInputValue key_input_val = 11;
    }
  }

  message Action {
    message Parameter {
      message ListEntry {
        string display_name = 1;
        string value = 2;
        repeated .logi.protocol.integrations.Integration.Action.Parameter parameters = 3;
      }

      message Number {
        float value = 1;
        bool use_min_value = 2;
        float min_value = 3;
        bool use_max_value = 4;
        float max_value = 5;
      }

      message Text {
        string value = 1;
      }

      enum ParameterType {
        INVALID = 0;
        LIST = 1;
        NUMBER = 2;
        TEXT = 3;
      }

      string parameter_id = 1;
      string error_message = 2;
      string assignment_message = 3;
      .logi.protocol.integrations.Integration.Action.Parameter.ParameterType parameter_type = 4;
      repeated .logi.protocol.integrations.Integration.Action.Parameter.ListEntry list_selection = 5;
      .logi.protocol.integrations.Integration.Action.Parameter.Number number_entry = 6;
      .logi.protocol.integrations.Integration.Action.Parameter.Text text_entry = 7;
      repeated .logi.protocol.integrations.Integration.Action.Parameter parameters = 20;
    }

    message Invoke {
      message ParametersEntry {
        string key = 1;
        string value = 2;
      }

      string action_id = 1;
      string integration_guid = 2;
      repeated .logi.protocol.integrations.Integration.Action.Invoke.ParametersEntry parameters = 3;
    }

    message Register {
      repeated .logi.protocol.integrations.Integration.Action actions = 1;
      .logi.protocol.integrations.InstanceInfo instance = 2;
    }

    string name = 1;
    string action_id = 2;
    string action_icon = 3;
    repeated .logi.protocol.integrations.Integration.Action.Parameter parameters = 4;
  }

  message Event {
    message Data {
      string tool_id = 1;
      string tool_option = 2;
      int32 value = 3;
      bool reset_options = 4;
      string name = 5;
      string message = 6;
      string message_type = 7;
      string test_id = 8;
      string result = 9;
    }

    .logi.protocol.integrations.Integration.Event.Data data = 1;
  }

  message EventMessage {
    .logi.protocol.integrations.InstanceInfo instance = 1;
    string event_id = 2;
    .logi.protocol.integrations.Integration.Event current = 3;
  }

  message Action_SDK_Entry {
    bool enabled = 1;
    bool instantiated_once = 2;
    repeated .logi.protocol.integrations.Integration.Action actions = 3;
  }

  message EventScheme {
    string event_id = 1;
  }

  message Events_SDK_Entry {
    bool enabled = 1;
    bool instantiated_once = 2;
    repeated .logi.protocol.integrations.Integration.EventScheme events = 3;
  }

  message IndividualApplicationPreferencesEntry {
    string key = 1;
    .logi.protocol.integrations.Integration.ApplicationPreferences value = 2;
  }

  enum IntegrationType {
    INVALID_TYPE = 0;
    ACTION = 4;
    EVENTS = 6;
  }

  enum LaunchType {
    INVALID = 0;
    MANUAL = 1;
    ON_STARTUP = 2;
    ON_FOCUS = 3;
  }

  enum PluginType {
    INVAL = 0;
    UXP = 1;
    CEP = 2;
    LUA = 3;
  }

  .logi.protocol.applications.Application target_application = 1;
  .logi.protocol.applications.Application supporting_application = 2;
  repeated string supported_application_ids = 3;
  string name = 4;
  string author = 5;
  string description = 6;
  string guid = 11;
  bool enabled = 12;
  bool is_official = 13;
  bool is_game = 14;
  .logi.protocol.integrations.Integration.LaunchType launch_type = 15;
  repeated .logi.protocol.integrations.Integration.IndividualApplicationPreferencesEntry individual_application_preferences = 16;
  .logi.protocol.integrations.Integration.Action_SDK_Entry action_sdk = 23;
  .logi.protocol.integrations.Integration.Events_SDK_Entry events_sdk = 25;
  bool has_installation = 30;
  string installation_message = 31;
  string download_message = 32;
  string download_url = 33;
  string plugin_path = 34;
  repeated .logi.protocol.integrations.LaunchCommand installation_commands = 35;
  oneof icon_type {
    string icon = 7;
    string icon_url = 8;
  }
  oneof poster_type {
    string poster = 9;
    string poster_url = 10;
  }
}

message InstanceInfo {
  string instance_guid = 3;
  .logi.protocol.integrations.Integration.IntegrationType sdk_type = 4;
  string application_version = 5;
  string application_locale = 6;
  .logi.protocol.integrations.Integration.PluginType plugin_type = 7;
  oneof integration_identification {
    string integration_guid = 1;
    string integration_identifier = 2;
  }
}

message AllInstanceInfos {
  repeated .logi.protocol.integrations.InstanceInfo instances_stack = 1;
}

message IntegrationInstances {
  repeated .logi.protocol.integrations.Integration.IntegrationType active_sdks = 1;
}

message ActiveIntegrations {
  message IntegrationsEntry {
    string key = 1;
    .logi.protocol.integrations.IntegrationInstances value = 2;
  }

  repeated .logi.protocol.integrations.ActiveIntegrations.IntegrationsEntry integrations = 1;
}

message Integrations {
  repeated .logi.protocol.integrations.Integration integrations = 1;
}

message IntegrationID {
  string guid = 1;
}

message IntegrationIDs {
  repeated string guids = 1;
}

message EnabledStatus {
  string guid = 1;
  bool enabled = 2;
  string application_id = 3;
  .logi.protocol.integrations.Integration.IntegrationType sdk_type = 4;
}

message LaunchStatus {
  string guid = 1;
  .logi.protocol.integrations.Integration.LaunchType launch_type = 2;
}

message IntegrationStates {
  message IntegrationState {
    bool installed = 1;
  }

  message IntegrationsEntry {
    string key = 1;
    .logi.protocol.integrations.IntegrationStates.IntegrationState value = 2;
  }

  repeated .logi.protocol.integrations.IntegrationStates.IntegrationsEntry integrations = 1;
}

message SpecificConfigOption {
  string guid = 1;
  string full_key_path = 2;
  .logi.protocol.integrations.Integration.ConfigOption config_option = 3;
  .logi.protocol.integrations.Integration.IntegrationType sdk_type = 4;
}

message CommunityIntegration {
  string name = 1;
  string description = 2;
  string download_url = 3;
}

message Install {
  message CustomTagsEntry {
    string key = 1;
    string value = 2;
  }

  string guid = 1;
  repeated .logi.protocol.integrations.Install.CustomTagsEntry custom_tags = 2;
}

message InstallMultiple {
  enum CompositionType {
    INVALID_COMPOSITION_TYPE = 0;
    COMBINE_CONDITIONALS = 1;
    COMBINE_INTEGRATIONS = 2;
    COMBINE_ALL = 3;
    SIMPLE_COMPOSITION = 4;
  }

  enum InstallType {
    INVALID_INSTALL_TYPE = 0;
    INSTALL_IF_REQUIRED = 1;
    FORCE_INSTALL = 2;
    NO_RESCHEDULE = 3;
  }

  enum ErrorHandleType {
    INVALID_ERROR_HANDLE_TYPE = 0;
  }

  .logi.protocol.integrations.InstallMultiple.CompositionType composition_type = 1;
  .logi.protocol.integrations.InstallMultiple.InstallType install_type = 2;
  .logi.protocol.integrations.InstallMultiple.ErrorHandleType error_handle_type = 3;
  int32 timeout_seconds = 6;
  repeated .logi.protocol.integrations.Install installations = 7;
}

message SDKIntegration {
  string name = 3;
  string author = 4;
  string description = 5;
  string icon = 6;
  string poster = 7;
  bool manual_registration = 8;
  .logi.protocol.integrations.Integration.IntegrationType integration_type = 10;
  oneof integration_identification {
    string app_path = 1;
    string integration_identifier = 2;
  }
}

message SDKConfigOption {
  string app_path = 1;
  string full_key_path = 2;
  .logi.protocol.integrations.Integration.ConfigOption default_config_option = 3;
  .logi.protocol.integrations.Integration.IntegrationType sdk_type = 4;
}

message OBS {
  message StatusUpdate {
    .logi.protocol.integrations.OBS.States current_state = 1;
    bool in_studio_mode = 2;
    int32 bitrate = 3;
    int32 framerate = 4;
    string uptime = 5;
    double cpu_usage = 6;
    string active_profile = 7;
    string active_collection = 8;
    string active_scene = 9;
  }

  enum States {
    INVALID_STATE = 0;
    IDLE = 1;
    STREAMING = 2;
    RECORDING = 3;
  }

}

message Schemes {
  .logi.protocol.integrations.InstanceInfo instance = 1;
  repeated .logi.protocol.integrations.Integration.EventScheme events = 2;
}

message EventBroadcast {
  string integration_guid = 1;
  string event_id = 2;
  .logi.protocol.integrations.Integration.Event previous = 3;
  .logi.protocol.integrations.Integration.Event current = 4;
}

message PluginInstallerStatus {
  enum InstallerStatus {
    PLUGIN_INSTALL_COMPLETED = 0;
    PLUGIN_INSTALL_ABORTED = 1;
    PLUGIN_INSTALL_FAILED = 2;
    ALL_OPERATIONS_COMPLETED = 3;
    PLUGIN_INSTALL_IN_PROGRESS = 4;
  }

  enum PluginOperation {
    INVALID = 0;
    UNINSTALL = 1;
    INSTALL = 2;
    UPDATE = 3;
  }

  string integration_guid = 1;
  .logi.protocol.integrations.PluginInstallerStatus.InstallerStatus installer_status = 2;
  string installer_error = 3;
  .logi.protocol.integrations.PluginInstallerStatus.PluginOperation operation = 4;
  .logi.protocol.integrations.IntegrationKey validation_key = 5;
}


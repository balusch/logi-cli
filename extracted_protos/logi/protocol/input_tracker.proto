syntax = "proto3";

package logi.protocol.input_tracker;

message Event {
  message Keyboard {
    uint32 hid_usage = 1;
    bool is_down = 2;
    string display_name = 3;
    string virtual_key_id = 4;
  }

  message Mouse {
    message Button {
      uint32 hid_usage = 1;
      bool is_down = 2;
    }

    message Move {
      int32 dx = 1;
      int32 dy = 2;
    }

    message Wheel {
      uint32 hid_usage = 1;
      bool is_positive = 2;
    }

    .logi.protocol.input_tracker.Event.Mouse.Button button = 1;
    .logi.protocol.input_tracker.Event.Mouse.Move move = 2;
    .logi.protocol.input_tracker.Event.Mouse.Wheel wheel = 3;
  }

  uint64 timestamp_microseconds = 1;
  .logi.protocol.input_tracker.Event.Keyboard keyboard = 2;
  .logi.protocol.input_tracker.Event.Mouse mouse = 3;
}

message Options {
  bool keyboard_exclusive = 1;
  repeated .logi.protocol.input_tracker.Filter filter = 2;
  .logi.protocol.input_tracker.CaptureMode capture_mode = 3;
}

enum Filter {
  NONE = 0;
  MOUSE_MOVE = 1;
  MOUSE_BUTTON = 2;
  MOUSE_WHEEL = 3;
  KEYBOARD = 4;
}

enum CaptureMode {
  MODIFIERS_BASED = 0;
  ANY = 1;
  ANY_BUT_ONLY_ONE = 2;
}


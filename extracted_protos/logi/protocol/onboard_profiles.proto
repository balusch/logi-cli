syntax = "proto3";

package logi.protocol.onboard_profiles;

import "logi/protocol/mouse.proto";
import "logi/protocol/macros.proto";
import "logi/protocol/firmware_lighting.proto";
import "logi/protocol/util.proto";

message Info {
  enum ProfileID {
    PROFILE_UNKNOWN = 0;
    PROFILE_1 = 1;
    PROFILE_2 = 2;
    PROFILE_3 = 3;
    PROFILE_4 = 4;
    PROFILE_5 = 5;
    PROFILE_ROM_1 = 6;
    PROFILE_ROM_2 = 7;
    PROFILE_ROM_3 = 8;
    PROFILE_ROM_4 = 9;
    PROFILE_ROM_5 = 10;
    PROFILE_ALL = 11;
    PROFILE_CURRENT = 12;
  }

  repeated .logi.protocol.onboard_profiles.Info.ProfileID profile_ids = 2;
}

message ProfileDirectory {
  message Entry {
    .logi.protocol.onboard_profiles.Info.ProfileID onboard_slot_id = 1;
    bool enabled = 2;
    string name = 3;
    uint32 report_rate = 4;
    .logi.protocol.mouse.Dpi.Table dpi_table = 5;
    .logi.protocol.util.Enable angle_snapping = 6;
    .logi.protocol.firmware_lighting.Effects lighting = 7;
    repeated .logi.protocol.onboard_profiles.MacroMapping button_mappings = 8;
    repeated .logi.protocol.onboard_profiles.MacroMapping gshift_mappings = 9;
  }

  repeated .logi.protocol.onboard_profiles.ProfileDirectory.Entry directory_entries = 1;
  .logi.protocol.onboard_profiles.Info.ProfileID active_profile = 2;
}

message MacroMapping {
  uint32 button = 1;
  .logi.protocol.macros.Macro macro = 2;
}

message ProfileSlot {
  string profile_id = 1;
  .logi.protocol.onboard_profiles.Info.ProfileID onboard_slot_id = 2;
}

message OnboardMode {
  enum Mode {
    INVALID = 0;
    HOST = 1;
    ONBOARD = 2;
  }

  .logi.protocol.onboard_profiles.OnboardMode.Mode mode = 1;
  bool is_temporary = 2;
}


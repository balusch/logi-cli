syntax = "proto3";

package logi.protocol.loupedeck;

import "google/protobuf/any.proto";

message Result {
  enum Code {
    INVALID = 0;
    INVALID_ARG = -1;
    INVALID_DEVICE = -2;
    NO_SUCH_PATH = -3;
    CANCELLED = -4;
    NOT_IMPLEMENTED = -5;
    INVALID_VERB = -6;
    NOT_READY = -7;
    FAULTED = -8;
    UNREACHABLE = -9;
    UNAUTHORIZED = -10;
    DUPLICATE_NAME = -11;
    NOT_FOUND = -12;
    EXCEPTION = -13;
    CONFLICT = -14;
    SUCCESS = 1;
  }

  .logi.protocol.loupedeck.Result.Code code = 1;
  string what = 2;
}

message Message {
  enum Verb {
    INVALID = 0;
    GET = 1;
    SET = 2;
    BROADCAST = 3;
    REMOVE = 4;
    SUBSCRIBE = 5;
    UNSUBSCRIBE = 6;
    OPTIONS = 7;
  }

  string msg_id = 1;
  .logi.protocol.loupedeck.Message.Verb verb = 2;
  string path = 3;
  string origin = 4;
  .logi.protocol.loupedeck.Result result = 5;
  .google.protobuf.Any payload = 6;
}

message Routes {
  message Route {
    .logi.protocol.loupedeck.Message.Verb verb = 1;
    string path = 2;
    string payload = 3;
    string example_json = 4;
    string endpoint = 5;
  }

  repeated .logi.protocol.loupedeck.Routes.Route route = 1;
}

message RegistrationTokens {
  repeated uint32 tokens = 1;
}

